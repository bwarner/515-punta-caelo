# Flat node_modules layout (no symlinks). Required for Vercel's serverless
# function packager, which fails on pnpm's default isolated layout with
# "framework produced an invalid deployment package... files in symlinked
# directories".
nodeLinker: hoisted

minimumReleaseAgeExclude:
  - "@posthog/core@1.29.11"
  - "@posthog/types@1.376.2"
  - posthog-js@1.376.2

allowBuilds:
  "@parcel/watcher": true
  better-sqlite3: true
  core-js: false
  esbuild: true
  protobufjs: false
  sharp: true
  unrs-resolver: true
